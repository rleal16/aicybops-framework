[tool:pytest]
# Pytest configuration for DAM Evaluation Pipeline tests

# Test discovery patterns (unit, integration, scripts subdirs)
testpaths = unit integration scripts
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output configuration
addopts = 
    --strict-markers
    --strict-config
    --tb=short
    --durations=10
    --disable-warnings
    -ra

# Minimum version requirement
minversion = 6.0

# Custom markers for test categorization
markers =
    unit: Unit tests for individual functions/methods
    integration: Integration tests for component interaction
    slow: Tests that take longer than 5 seconds to run
    gpu: Tests that require GPU/CUDA availability
    data_validation: Tests focused on data quality and validation
    model_inference: Tests for model prediction and scoring
    config_validation: Tests for configuration parameter validation
    edge_cases: Tests for boundary conditions and error handling
    file_io: Tests for file operations and I/O
    logging: Tests for logging and progress tracking

# Logging configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Test filtering options
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:torch.*

# Coverage configuration (when pytest-cov is available)
# These settings are only used when --cov is specified
[coverage:run]
source = ..
omit = 
    */tests/*
    */test_*
    */__pycache__/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.: 